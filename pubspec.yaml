# アプリ名（フォルダ名と一致させるのが無難）
name: radio_player_simple

# アプリの説明（ストア公開しないなら自由でOK）
description: Radio optimized simple audio player (Phase 1 mock)

# pub.dev に公開しない設定
publish_to: 'none'

# バージョン
# 1.0.0 → ユーザー向けバージョン
# +1    → ビルド番号（Android / iOS 用）
version: 1.0.0+1

# Dart SDK のバージョン制約
# Flutter 3.16 以降ならこの範囲でOK
environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  # Flutter本体
  flutter:
    sdk: flutter

  # iOS風アイコン（使わなくても害なし）
  cupertino_icons: ^1.0.6

  # 🎵 音声再生ライブラリ
  # ・倍速再生対応
  # ・ピッチ保持対応
  # ・Android / iOS / Windows 対応
  # ・ローカルファイル再生可能
  just_audio: ^0.9.36
  just_audio_windows: ^0.2.2

  # 📂 ファイル・フォルダ選択ダイアログ
  # 各OSネイティブUIを呼び出す
  # Android / iOS / Windows 対応
  file_selector: ^1.0.1

  # 💾 軽量な設定保存（キー・バリュー）
  shared_preferences: ^2.3.2
  ffmpeg_helper: ^1.0.1
  ffmpeg_kit_flutter_new: ^4.1.0
  package_info_plus: ^4.2.0
  path: ^1.9.1
  path_provider: ^2.1.5
  just_audio_background: ^0.0.1-beta.17
  wakelock_plus: ^1.1.6

dev_dependencies:
  # テスト用（今回は特に使わないが残してOK）
  flutter_test:
    sdk: flutter

  # コード警告ルール
  # Pythonでいうflake8、JavaでいうCheckstyle的なもの
  flutter_lints: ^3.0.0

flutter:
  # Materialアイコンを有効化
  uses-material-design: true
